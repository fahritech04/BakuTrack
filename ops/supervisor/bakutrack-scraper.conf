[program:bakutrack-scraper]
directory=/var/www/bakutrack/scraper
command=/var/www/bakutrack/scraper/.venv/bin/uvicorn src.main:app --host 0.0.0.0 --port 9000
autostart=true
autorestart=true
user=www-data
stdout_logfile=/var/log/supervisor/bakutrack-scraper.log
stderr_logfile=/var/log/supervisor/bakutrack-scraper-error.log
